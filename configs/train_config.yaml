# ============================================================
# 超限车辆智能感知系统 - YOLOv8 训练配置
# ============================================================
# 使用方式: python src/train.py --data data/dataset.yaml --config configs/train_config.yaml

# --- 模型配置 ---
# 可选: yolov8n.pt / yolov8s.pt / yolov8m.pt / yolov8l.pt / yolov8x.pt
# RTX 4050 (6GB) 推荐使用 yolov8s.pt
model: yolov8s.pt

# --- 训练配置 ---
epochs: 100         # 训练轮数
batch_size: 8       # 批次大小 (6GB显存推荐8)
img_size: 640       # 输入图像尺寸
optimizer: AdamW    # 优化器 (SGD / Adam / AdamW)
lr0: 0.001          # 初始学习率
lrf: 0.01           # 最终学习率 (lr0 * lrf)
patience: 20        # 早停耐心值 (连续N轮无提升则停止)
workers: 4          # 数据加载线程数

# --- 数据增强配置 ---
augmentation:
  hsv_h: 0.015      # 色调增强范围
  hsv_s: 0.7        # 饱和度增强范围
  hsv_v: 0.4        # 明度增强范围
  degrees: 5.0      # 旋转角度范围
  translate: 0.1    # 平移范围
  scale: 0.5        # 缩放范围
  fliplr: 0.5       # 水平翻转概率
  mosaic: 1.0       # Mosaic增强概率
  mixup: 0.1        # MixUp增强概率

# --- 对比实验配置 ---
# 用于 evaluate.py compare 模式
comparison_models:
  - yolov8n.pt      # Nano (最快)
  - yolov8s.pt      # Small (推荐)
  - yolov8m.pt      # Medium (更准但更慢)
