# 数据集配置文件 - YOLOv8 格式
# ============================================================
# 将此文件放在数据集根目录，或修改 path 为数据集实际路径
# ============================================================

# 数据集根目录 (使用绝对路径)
path: /home/kang/research/data/processed

# 训练/验证/测试集的相对路径 (相对于 path)
train: images/train
val: images/val
test: images/test

# 类别数量
nc: 6

# 类别名称
names:
  0: car        # 小轿车
  1: bus        # 客车
  2: truck      # 货车
  3: van        # 面包车/厢式货车
  4: suv        # SUV
  5: tanker     # 危化品运输车/罐车
